name: Generate Store Listing Assets

on:
  workflow_dispatch:

jobs:
  generate-assets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install ImageMagick
        run: sudo apt-get install -y imagemagick
      
      - name: Create assets directory
        run: mkdir -p store-assets
      
      - name: Generate App Icon (512x512)
        run: |
          convert -size 512x512 xc:'#FF6B35' \
            -font Helvetica-Bold -pointsize 120 \
            -fill white -gravity center \
            -annotate +0+0 'FH' \
            store-assets/icon-512x512.png
      
      - name: Generate Feature Graphic (1024x500)
        run: |
          convert -size 1024x500 xc:'#FF6B35' \
            -font Helvetica-Bold -pointsize 60 \
            -fill white -gravity center \
            -annotate +0+0 'FastHub Food Delivery' \
            store-assets/feature-1024x500.png
      
      - name: Generate Phone Screenshots (1080x1920)
        run: |
          for i in 1 2 3; do
            TEXT="Screen $i"
            case $i in
              1) TEXT="Browse Restaurants" ;;
              2) TEXT="Order Food" ;;
              3) TEXT="Fast Delivery" ;;
            esac
            convert -size 1080x1920 xc:'#FF6B35' \
              -font Helvetica-Bold -pointsize 80 \
              -fill white -gravity center \
              -annotate +0+0 "$TEXT" \
              store-assets/phone-screenshot-$i.png
          done
      
      - name: Generate Tablet Screenshots (1200x1920)
        run: |
          convert -size 1200x1920 xc:'#FF6B35' \
            -font Helvetica-Bold -pointsize 80 \
            -fill white -gravity center \
            -annotate +0+0 'FastHub Tablet' \
            store-assets/tablet-7inch.png
          convert -size 1200x1920 xc:'#FF6B35' \
            -font Helvetica-Bold -pointsize 80 \
            -fill white -gravity center \
            -annotate +0+0 'FastHub Tablet' \
            store-assets/tablet-10inch.png
      
      - name: Commit assets
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add store-assets/
          git commit -m 'Add store listing assets'
          git push
