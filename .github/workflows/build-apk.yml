name: Build Android AAB

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Create React Native project
        run: |
          npx react-native@0.73.6 init FastHubDelivery --version 0.73.6 --skip-git-init --skip-install
          cp App.js FastHubDelivery/App.tsx

      - name: Install base dependencies
        working-directory: FastHubDelivery
        run: npm install

      - name: Generate release keystore
        working-directory: FastHubDelivery/android/app
        run: keytool -genkey -v -keystore release-key.jks -keyalg RSA -keysize 2048 -validity 10000 -alias fasthub-key -storepass fasthub123 -keypass fasthub123 -dname "CN=FastHub, OU=Dev, O=FastHub, L=London, ST=England, C=GB"

      - name: Add signing config to gradle.properties
        working-directory: FastHubDelivery/android
        run: |
          echo "MYAPP_RELEASE_STORE_FILE=release-key.jks" >> gradle.properties
          echo "MYAPP_RELEASE_KEY_ALIAS=fasthub-key" >> gradle.properties
          echo "MYAPP_RELEASE_STORE_PASSWORD=fasthub123" >> gradle.properties
          echo "MYAPP_RELEASE_KEY_PASSWORD=fasthub123" >> gradle.properties

      - name: Write signing config script
        run: |
          cat > /tmp/fix_gradle.js << 'SCRIPT'
          const fs = require("fs");
          const path = "FastHubDelivery/android/app/build.gradle";
          let content = fs.readFileSync(path, "utf8");
          const signingBlock = [
            "    signingConfigs {",
            "        release {",
            "            if (project.hasProperty('MYAPP_RELEASE_STORE_FILE')) {",
            "                storeFile file(MYAPP_RELEASE_STORE_FILE)",
            "                storePassword MYAPP_RELEASE_STORE_PASSWORD",
            "                keyAlias MYAPP_RELEASE_KEY_ALIAS",
            "                keyPassword MYAPP_RELEASE_KEY_PASSWORD",
            "            }",
            "        }",
            "    }"
          ].join("\n");
          content = content.replace("buildTypes {", signingBlock + "\n    buildTypes {");
          content = content.replace("signingConfig signingConfigs.debug", "signingConfig signingConfigs.release");
          fs.writeFileSync(path, content);
          console.log("build.gradle updated with release signing");
          SCRIPT

      - name: Apply signing config
        run: node /tmp/fix_gradle.js

      - name: Build Android AAB
        working-directory: FastHubDelivery/android
        run: |
          chmod +x gradlew
          ./gradlew bundleRelease --no-daemon

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: FastHub-Delivery-AAB
          path: FastHubDelivery/android/app/build/outputs/bundle/release/*.aab
