name: Build Android AAB

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Create React Native project
        run: |
          npx react-native@0.73.6 init FastHubFoodApp --version 0.73.6 --skip-git-init --skip-install
          cp App.js FastHubFoodApp/App.tsx

      - name: Update package name
        working-directory: FastHubFoodApp
        run: |
          # Update Android package name to com.fasthub.fooddeliveryapp
          sed -i 's/com.fasthubfoodapp/com.fasthub.fooddeliveryapp/g' android/app/build.gradle
          sed -i 's/com.fasthubfoodapp/com.fasthub.fooddeliveryapp/g' android/app/src/main/AndroidManifest.xml
          
          # Create proper directory structure for new package
          mkdir -p android/app/src/main/java/com/fasthub/fooddeliveryapp
          
          # Move MainActivity and MainApplication
          if [ -f android/app/src/main/java/com/fasthubfoodapp/MainActivity.kt ]; then
            sed -i 's/package com.fasthubfoodapp/package com.fasthub.fooddeliveryapp/g' android/app/src/main/java/com/fasthubfoodapp/MainActivity.kt
            mv android/app/src/main/java/com/fasthubfoodapp/MainActivity.kt android/app/src/main/java/com/fasthub/fooddeliveryapp/
          fi
          if [ -f android/app/src/main/java/com/fasthubfoodapp/MainApplication.kt ]; then
            sed -i 's/package com.fasthubfoodapp/package com.fasthub.fooddeliveryapp/g' android/app/src/main/java/com/fasthubfoodapp/MainApplication.kt
            mv android/app/src/main/java/com/fasthubfoodapp/MainApplication.kt android/app/src/main/java/com/fasthub/fooddeliveryapp/
          fi
          
          # Also handle Java files if they exist
          if [ -f android/app/src/main/java/com/fasthubfoodapp/MainActivity.java ]; then
            sed -i 's/package com.fasthubfoodapp/package com.fasthub.fooddeliveryapp/g' android/app/src/main/java/com/fasthubfoodapp/MainActivity.java
            mv android/app/src/main/java/com/fasthubfoodapp/MainActivity.java android/app/src/main/java/com/fasthub/fooddeliveryapp/
          fi
          if [ -f android/app/src/main/java/com/fasthubfoodapp/MainApplication.java ]; then
            sed -i 's/package com.fasthubfoodapp/package com.fasthub.fooddeliveryapp/g' android/app/src/main/java/com/fasthubfoodapp/MainApplication.java
            mv android/app/src/main/java/com/fasthubfoodapp/MainApplication.java android/app/src/main/java/com/fasthub/fooddeliveryapp/
          fi
          
          # Update app name in strings.xml
          sed -i 's/<string name="app_name">.*<\/string>/<string name="app_name">FastHub Food Delivery<\/string>/g' android/app/src/main/res/values/strings.xml

      - name: Install dependencies
        working-directory: FastHubFoodApp
        run: npm install

      - name: Generate release keystore
        working-directory: FastHubFoodApp/android/app
        run: |
          keytool -genkeypair -v \
            -keystore release.keystore \
            -alias fasthub-key \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass fasthub123 -keypass fasthub123 \
            -dname "CN=FastHub, OU=Dev, O=FastHub, L=London, ST=England, C=GB"

      - name: Configure signing
        working-directory: FastHubFoodApp/android
        run: |
          cat >> app/build.gradle << 'SIGNING'
          
          android {
              signingConfigs {
                  release {
                      storeFile file('release.keystore')
                      storePassword 'fasthub123'
                      keyAlias 'fasthub-key'
                      keyPassword 'fasthub123'
                  }
              }
              buildTypes {
                  release {
                      signingConfig signingConfigs.release
                  }
              }
          }
          SIGNING

      - name: Build Release AAB
        working-directory: FastHubFoodApp/android
        run: |
          chmod +x gradlew
          ./gradlew bundleRelease --no-daemon

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-aab
          path: FastHubFoodApp/android/app/build/outputs/bundle/release/app-release.aab
