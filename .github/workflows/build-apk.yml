name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Create React Native project
        run: |
          npx react-native@0.73.6 init FastHubDelivery --version 0.73.6 --skip-git-init --skip-install
          cp App.js FastHubDelivery/App.tsx

      - name: Install base dependencies
        working-directory: FastHubDelivery
        run: npm install

      - name: Build Android APK
        working-directory: FastHubDelivery/android
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: FastHub-Delivery-APK
          path: FastHubDelivery/android/app/build/outputs/apk/release/*.apk
