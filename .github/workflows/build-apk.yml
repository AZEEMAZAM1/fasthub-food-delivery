name: Build Android AAB

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Create React Native project
        run: |
          npx react-native@0.73.6 init FastHubDelivery --version 0.73.6 --skip-git-init --skip-install
          cp App.js FastHubDelivery/App.tsx

      - name: Install base dependencies
        working-directory: FastHubDelivery
        run: npm install

      - name: Generate release keystore
        working-directory: FastHubDelivery/android/app
        run: |
          keytool -genkey -v -keystore release-key.jks -keyalg RSA -keysize 2048 -validity 10000 \
            -alias fasthub-key -storepass fasthub123 -keypass fasthub123 \
            -dname "CN=FastHub, OU=Dev, O=FastHub, L=London, ST=England, C=GB"

      - name: Update targetSdkVersion and compileSdkVersion to 35
        working-directory: FastHubDelivery/android/app
        run: |
          sed -i 's/compileSdkVersion = 34/compileSdkVersion = 35/g' build.gradle
          sed -i 's/targetSdkVersion = 34/targetSdkVersion = 35/g' build.gradle
          sed -i 's/compileSdk = 34/compileSdk = 35/g' build.gradle
          sed -i 's/targetSdk = 34/targetSdk = 35/g' build.gradle
          echo "=== Verify SDK versions ==="
          grep -i "compileSdk\|targetSdk" build.gradle

      - name: Update compileSdkVersion in root build.gradle
        working-directory: FastHubDelivery/android
        run: |
          sed -i 's/compileSdkVersion = 34/compileSdkVersion = 35/g' build.gradle
          sed -i 's/targetSdkVersion = 34/targetSdkVersion = 35/g' build.gradle
          cat build.gradle

      - name: Bump versionCode to 2
        working-directory: FastHubDelivery/android/app
        run: |
          sed -i 's/versionCode 1/versionCode 2/g' build.gradle
          sed -i 's/versionName "1.0"/versionName "1.1"/g' build.gradle
          echo "=== Verify version ==="
          grep -i "versionCode\|versionName" build.gradle

      - name: Configure release signing in build.gradle
        working-directory: FastHubDelivery/android/app
        run: |
          sed -i '/android {/a\
              signingConfigs {\
                  release {\
                      storeFile file("release-key.jks")\
                      storePassword "fasthub123"\
                      keyAlias "fasthub-key"\
                      keyPassword "fasthub123"\
                  }\
              }' build.gradle

          sed -i 's/signingConfig signingConfigs.debug/signingConfig signingConfigs.release/g' build.gradle

          echo "=== Verify build.gradle signingConfigs ==="
          grep -A 8 "signingConfigs" build.gradle
          echo "=== Verify release buildType ==="
          grep -A 5 "release {" build.gradle

      - name: Build Android AAB (release signed)
        working-directory: FastHubDelivery/android
        run: |
          chmod +x gradlew
          ./gradlew bundleRelease --no-daemon

      - name: Verify AAB is release signed
        working-directory: FastHubDelivery/android
        run: |
          AAB=$(find app/build/outputs/bundle/release -name "*.aab" | head -1)
          echo "AAB file: $AAB"
          jarsigner -verify -verbose "$AAB" | head -10
          echo "--- Checking for debug signature ---"
          if jarsigner -verify "$AAB" 2>&1 | grep -i "debug"; then
            echo "ERROR: AAB is still signed with debug key!"
            exit 1
          fi
          echo "SUCCESS: AAB is signed with release key"

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: FastHub-Delivery-AAB
          path: FastHubDelivery/android/app/build/outputs/bundle/release/*.aab
