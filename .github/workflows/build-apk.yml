name: Build Android AAB

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Create React Native project
        run: |
          npx react-native@0.73.6 init FastHubDelivery --version 0.73.6 --skip-git-init --skip-install
          cp App.js FastHubDelivery/App.tsx

      - name: Install base dependencies
        working-directory: FastHubDelivery
        run: npm install

      - name: Generate release keystore
        working-directory: FastHubDelivery/android/app
        run: |
          keytool -genkey -v -keystore release-key.jks -keyalg RSA -keysize 2048 -validity 10000 -alias fasthub-key -storepass fasthub123 -keypass fasthub123 -dname "CN=FastHub, OU=Dev, O=FastHub, L=London, ST=England, C=GB"

      - name: Configure release signing in build.gradle
        working-directory: FastHubDelivery/android/app
        run: |
          python3 << 'EOF'
          import re

          with open('build.gradle', 'r') as f:
              content = f.read()

          signing_config = """
    signingConfigs {
        release {
            storeFile file("release-key.jks")
            storePassword "fasthub123"
            keyAlias "fasthub-key"
            keyPassword "fasthub123"
        }
    }
"""

          content = content.replace(
              'buildTypes {',
              signing_config + '    buildTypes {'
          )

          content = content.replace(
              'signingConfig signingConfigs.debug',
              'signingConfig signingConfigs.release'
          )

          with open('build.gradle', 'w') as f:
              f.write(content)

          print("build.gradle updated with release signing config")
          EOF

      - name: Build Android AAB
        working-directory: FastHubDelivery/android
        run: |
          chmod +x gradlew
          ./gradlew bundleRelease --no-daemon

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: FastHub-Delivery-AAB
          path: FastHubDelivery/android/app/build/outputs/bundle/release/*.aab
