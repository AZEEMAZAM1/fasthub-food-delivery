name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install dependencies
        run: npm install

      - name: Install Expo CLI and sharp
        run: npm install -g expo-cli && npm install sharp-cli

      - name: Generate placeholder icon and splash
        run: |
          mkdir -p assets
          sudo apt-get install -y imagemagick
          convert -size 1024x1024 xc:'#00CCBC' -fill white -gravity center -pointsize 120 -annotate 0 'FH' assets/icon.png
          convert -size 1284x2778 xc:'#00CCBC' -fill white -gravity center -pointsize 80 -annotate 0 'FastHub Delivery' assets/splash.png
          convert -size 1024x1024 xc:'#00CCBC' -fill white -gravity center -pointsize 120 -annotate 0 'FH' assets/adaptive-icon.png

      - name: Prebuild Android
        run: npx expo prebuild --platform android --clean

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build APK
        working-directory: android
        run: ./gradlew assembleRelease --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: FastHub-Delivery-APK
          path: android/app/build/outputs/apk/release/*.apk
          retention-days: 30
