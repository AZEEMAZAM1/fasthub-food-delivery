name: Build Android AAB

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Create React Native project
        run: |
          npx react-native@0.73.6 init FastHubDelivery --version 0.73.6 --skip-git-init --skip-install
          cp App.js FastHubDelivery/App.tsx

      - name: Install base dependencies
        working-directory: FastHubDelivery
        run: npm install

      - name: Generate release keystore
        working-directory: FastHubDelivery/android/app
        run: keytool -genkey -v -keystore release-key.jks -keyalg RSA -keysize 2048 -validity 10000 -alias fasthub-key -storepass fasthub123 -keypass fasthub123 -dname "CN=FastHub, OU=Dev, O=FastHub, L=London, ST=England, C=GB"

      - name: Configure release signing
        run: node scripts/fix_signing.js FastHubDelivery/android/app/build.gradle

      - name: Build Android AAB
        working-directory: FastHubDelivery/android
        run: |
          chmod +x gradlew
          ./gradlew bundleRelease --no-daemon

      - name: Re-sign AAB with release key using jarsigner
        working-directory: FastHubDelivery/android
        run: |
          AAB_FILE=$(find app/build/outputs/bundle/release -name "*.aab" | head -1)
          echo "Found AAB: $AAB_FILE"
          jarsigner -verbose -sigalg SHA256withRSA -digestalg SHA-256 -keystore app/release-key.jks -storepass fasthub123 -keypass fasthub123 "$AAB_FILE" fasthub-key
          jarsigner -verify "$AAB_FILE"
          echo "AAB re-signed and verified with release key"

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: FastHub-Delivery-AAB
          path: FastHubDelivery/android/app/build/outputs/bundle/release/*.aab
